name: build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release --target MicVST MicVSTTests

      - name: Test
        run: ./build/MicVSTTests_artefacts/Release/MicVSTTests.exe

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: MicVST
          path: build/MicVST_artefacts/Release/MicVST.exe
